<form action="https://formspree.io/f/xxxxxxxx" method="POST" class="p-6 md:p-8 space-y-6" oninput="calculateTotal()">
    
    <!-- ================= ส่วนเลือกทรงผม (เพิ่มใหม่) ================= -->
    <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 space-y-4">
        <div class="flex items-center justify-between">
            <label class="block text-sm font-medium text-gray-700">
                1. เลือกทรงผมที่ต้องการ
            </label>
            <!-- ลิงก์ไปยัง Google Drive เพื่อดูตัวอย่างทรงผม -->
            <a href="https://drive.google.com" target="_blank" class="text-xs text-indigo-600 hover:text-indigo-800 font-medium flex items-center gap-1 underline">
                📁 คลิกดูแบบทรงผมใน Google Drive
            </a>
        </div>

        <div>
            <label for="hair_style_number" class="block text-xs text-gray-500 mb-1">
                เลือกหมายเลขทรงผม (เบอร์ 1 - 50)
            </label>
            <select id="hair_style_number" name="hair_style_number" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2.5 bg-white border">
                <option value="">-- กรุณาเลือกเบอร์ทรงผม --</option>
                <!-- แถบตัวเลือกเลข 1-50 -->
                <script>
                    for (let i = 1; i <= 50; i++) {
                        document.write(`<option value="${i}">ทรงผมเบอร์ ${i}</option>`);
                    }
                </script>
            </select>
        </div>

        <!-- รายละเอียดเพิ่มเติมกรณีไม่มีเบอร์ทรงผม -->
        <p class="text-xs text-amber-600 bg-amber-50 p-2.5 rounded border border-amber-200">
            💡 **หมายเหตุ:** หากทรงผมที่ต้องการไม่มีระบุในเบอร์ 1-50 กรุณาเลือกเป็นช่องว่างไว้ แล้วสามารถแคปภาพทรงผมส่งให้ทางแชท/ช่องทางติดต่อแทนได้เลยครับ
        </p>
    </div>
    
    <hr class="border-gray-200My-4">

    <!-- ================= ส่วนข้อมูลเดิมของคุณ (ตัวอย่างโครงสร้างเดิม) ================= -->
    <!-- ช่องกรอกข้อมูลอื่นๆ เช่น ชื่อ, มหาวิทยาลัย, ที่อยู่ สามารถใส่ต่อตรงนี้ได้เลยครับ -->
    <div class="space-y-4">
        <div>
            <label for="university_name" class="block text-sm font-medium text-gray-700">ข้อมูลมหาวิทยาลัย</label>
            <input type="text" id="university_name" name="university_name" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border">
        </div>

        <div>
            <label for="shipping_address" class="block text-sm font-medium text-gray-700">ที่อยู่จัดส่ง</label>
            <textarea id="shipping_address" name="shipping_address" rows="3" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border"></textarea>
        </div>
    </div>

    <!-- ================= ปุ่มกดส่งข้อมูลหลังบ้าน ================= -->
    <div class="pt-4">
        <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors">
            ยืนยันการส่งข้อมูลและใบสั่งซื้อ
        </button>
    </div>

</form>
