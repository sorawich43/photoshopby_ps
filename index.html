<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสั่งทำรูปติดบัตรออนไลน์ Photoshopby.ps</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; }
        /* สไตล์คลาสเมื่อเลือกชุดแล้วให้ปุ่มเด่นเด้งออกมา */
        .suit-selected {
            background-color: #eff6ff !important;
            border-color: #2563eb !important;
            color: #1d4ed8 !important;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.1), 0 2px 4px -1px rgba(37, 99, 235, 0.06) !important;
            transform: scale(1.02);
            font-weight: 600;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 antialiased py-8 px-4">

    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden">
        <div class="bg-gradient-to-r from-blue-600 to-indigo-700 p-6 text-white text-center">
            <h1 class="text-2xl font-bold md:text-3xl">บริการสั่งทำรูปติดบัตรออนไลน์</h1>
            <p class="text-blue-100 text-sm mt-1">Photoshopby.ps</p>
        </div>

        <form class="p-6 md:p-8 space-y-6" oninput="calculateTotal()">
            
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 space-y-4">
                <div class="flex items-center justify-between">
                    <label class="block text-sm font-semibold text-slate-700">
                        เลือกทรงผมที่ต้องการ
                    </label>
                    <a href="https://drive.google.com/file/d/1k6njRexMHlMAyj84wCdAJVpYgsy0u27B/view?usp=drivesdk" target="_blank" class="text-xs text-blue-600 hover:text-blue-800 font-medium flex items-center gap-1 underline">
                        📁 คลิกดูแบบทรงผมใน Google Drive
                    </a>
                </div>

                <div>
                    <label for="hair_style_number" class="block text-xs text-slate-500 mb-1">
                        เลือกหมายเลขทรงผม (เบอร์ 1 - 50)
                    </label>
                    <select id="hair_style_number" name="hair_style_number" onchange="calculateTotal()" class="w-full p-2.5 border rounded-lg bg-white outline-none focus:border-blue-500 text-sm">
                        <option value="">-- กรุณาเลือกเบอร์ทรงผม --</option>
                        <script>
                            for (let i = 1; i <= 50; i++) {
                                document.write(`<option value="${i}">ทรงผมเบอร์ ${i}</option>`);
                            }
                        </script>
                    </select>
                </div>

                <p class="text-xs text-amber-600 bg-amber-50 p-2.5 rounded-lg border border-amber-200">
                    💡 **หมายเหตุ:** หากไม่มีเบอร์ทรงผมที่ต้องการ สามารถเลือกเว้นว่างไว้ แล้วแคปภาพทรงผมส่งให้ทางร้านแทนได้เลยครับ
                </p>
            </div>

            <hr class="border-slate-100 my-2">

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">1. เลือกประเภทชุด (ค่าบริการตัดต่อ 200 บาท)</label>
                <div class="grid grid-cols-2 gap-3 sm:grid-cols-4" id="suit_group">
                    <label class="suit-card flex items-center justify-center p-3 border rounded-xl cursor-pointer hover:bg-slate-50 transition duration-200">
                        <input type="radio" name="suit_type" value="ทำงาน" class="sr-only" onclick="selectSuit(this, 'ทำงาน')" required>
                        <span class="text-sm">ชุดสูททำงาน</span>
                    </label>
                    <label class="suit-card flex items-center justify-center p-3 border rounded-xl cursor-pointer hover:bg-slate-50 transition duration-200">
                        <input type="radio" name="suit_type" value="นักศึกษา" class="sr-only" onclick="selectSuit(this, 'นักศึกษา')">
                        <span class="text-sm">ชุดนักศึกษา</span>
                    </label>
                    <label class="suit-card flex items-center justify-center p-3 border rounded-xl cursor-pointer hover:bg-slate-50 transition duration-200">
                        <input type="radio" name="suit_type" value="ราชการ" class="sr-only" onclick="selectSuit(this, 'ราชการ')">
                        <span class="text-sm">ชุดข้าราชการ</span>
                    </label>
                    <label class="suit-card flex items-center justify-center p-3 border rounded-xl cursor-pointer hover:bg-slate-50 transition duration-200">
                        <input type="radio" name="suit_type" value="ครุย" class="sr-only" onclick="selectSuit(this, 'ครุย')">
                        <span class="text-sm">ชุดครุย</span>
                    </label>
                </div>
            </div>

            <div id="university_field" class="hidden bg-slate-50 p-4 rounded-xl border border-slate-200">
                <label class="block text-sm font-medium text-slate-700 mb-1">ระบุชื่อมหาวิทยาลัย</label>
                <input type="text" id="university_name" class="w-full p-2.5 border rounded-lg bg-white outline-none focus:border-blue-500" placeholder="เช่น มหาวิทยาลัยมหิดล">
            </div>

            <div id="government_fields" class="hidden bg-slate-50 p-4 rounded-xl border border-slate-200 space-y-3">
                <h4 class="text-sm font-semibold text-slate-700 border-b pb-1">ข้อมูลสำหรับชุดราชการ</h4>
                <input type="text" id="thai_silk_year" class="w-full p-2.5 border rounded-lg bg-white outline-none" placeholder="ปีแพรไหม (แถบเครื่องราชฯ)">
                <input type="text" id="gov_level" class="w-full p-2.5 border rounded-lg bg-white outline-none" placeholder="ระดับปฏิบัติการ / ชำนาญการ">
                <input type="text" id="gov_department" class="w-full p-2.5 border rounded-lg bg-white outline-none" placeholder="หน่วยงานราชการ / กระทรวง / กรม">
            </div>

            <div class="bg-amber-50 p-4 rounded-xl border border-amber-200 flex items-center justify-between">
                <label for="express_job" class="flex items-center space-x-3 cursor-pointer w-full">
                    <input type="checkbox" id="express_job" onchange="calculateTotal()" class="w-5 h-5 text-amber-600 rounded">
                    <div>
                        <span class="font-semibold text-amber-900 text-sm block">ต้องการงานด่วน (+90 บาท)</span>
                        <span class="text-xs text-amber-700">รับงานในวันถัดไปทันที</span>
                    </div>
                </label>
            </div>

            <div class="border-t pt-4">
                <label class="block text-sm font-semibold text-slate-700 mb-2">2. ต้องการรับภาพปรินต์จัดส่งด้วยหรือไม่?</label>
                <div class="flex gap-4 mb-3">
                    <label class="flex items-center space-x-2 cursor-pointer text-sm">
                        <input type="radio" name="want_print" value="no" checked onclick="togglePrint(false)" class="w-4 h-4">
                        <span>รับเฉพาะไฟล์รูปตัดต่อ</span>
                    </label>
                    <label class="flex items-center space-x-2 cursor-pointer text-sm font-medium text-blue-600">
                        <input type="radio" name="want_print" value="yes" onclick="togglePrint(true)" class="w-4 h-4">
                        <span>รับภาพปรินต์จัดส่งถึงบ้าน</span>
                    </label>
                </div>

                <div id="print_options" class="hidden bg-blue-50/50 p-4 rounded-xl border border-blue-100 space-y-3">
                    <div class="flex gap-4 text-sm">
                        <span class="font-medium text-slate-600">ขนาด:</span>
                        <label><input type="radio" name="print_size" value="1 นิ้ว" checked onchange="calculateTotal()"> 1 นิ้ว</label>
                        <label><input type="radio" name="print_size" value="1.5 นิ้ว" onchange="calculateTotal()"> 1.5 นิ้ว</label>
                        <label><input type="radio" name="print_size" value="2 นิ้ว" onchange="calculateTotal()" class="mr-1"> 2 นิ้ว</label>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <label class="p-2.5 border bg-white rounded-lg flex justify-between items-center cursor-pointer text-sm">
                            <span><input type="radio" name="print_quantity" value="90" checked onchange="calculateTotal()"> ครึ่งโหล (6 รูป)</span>
                            <span class="font-bold">90 บ.</span>
                        </label>
                        <label class="p-2.5 border bg-white rounded-lg flex justify-between items-center cursor-pointer text-sm">
                            <span><input type="radio" name="print_quantity" value="120" onchange="calculateTotal()"> หนึ่งโหล (12 รูป)</span>
                            <span class="font-bold">120 บ.</span>
                        </label>
                    </div>
                    <textarea id="shipping_address" rows="2" class="w-full p-2.5 border rounded-lg bg-white text-sm outline-none placeholder-slate-400" placeholder="ระบุ ชื่อ-นามสกุล, เบอร์โทร และที่อยู่จัด
